<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Checking WebSocket…</title>
<script>
(async () => {
    try {
        const ws = new WebSocket("wss://echo.websocket.events");

        ws.onopen = () => {
            ws.close();
            window.location.href = "https://deluxe.streamlit.app";
        };

        ws.onerror = () => {
            window.location.href = "https://salade10.github.io/decline-message/";
        };

        setTimeout(() => {
            if (ws.readyState !== WebSocket.OPEN) {
                window.location.href = "https://salade10.github.io/decline-message/";
            }
        }, 4000); // give it more time
    } catch (e) {
        window.location.href = "https://salade10.github.io/decline-message/";
    }
})();
</script>

</head>
<body>
  <p>Checking your connection…</p>
</body>
</html>
