<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Checking WebSocket…</title>
  <script>
  (async () => {
      try {
          const ws = new WebSocket("wss://ws.postman-echo.com/raw");

          ws.onopen = () => {
              ws.close();
              window.location.href = "https://deluxe.streamlit.app";
          };

          ws.onerror = () => {
              window.location.href = "https://Salade10.github.io/decline-message/";
          };

          setTimeout(() => {
              if (ws.readyState !== 1) {
                  window.location.href = "https://Salade10.github.io/decline-message/";
              }
          }, 2000);

      } catch (e) {
          window.location.href = "https://Salade10.github.io/decline-message/";
      }
  })();
  </script>
</head>
<body>
  <p>Checking your connection…</p>
</body>
</html>
